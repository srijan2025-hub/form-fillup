<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Form Filler</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="theme.css">
</head>
<body>

<div class="container">
    <h2>Master Details Hub</h2>

    <div class="theme-switcher">
        <label for="themeSelect">🎨 Theme:</label>
        <select id="themeSelect" onchange="changeTheme()">
            <option value="theme-default">Light (Default)</option>
            <option value="theme-dark">🌙 Dark Mode</option>
            <option value="theme-ocean">🌊 Ocean</option>
            <option value="theme-hacker">💻 Hacker</option>
            <option value="theme-sunset">🌅 Sunset</option>
            <option value="theme-neon">🟣 Neon Cyberpunk</option>
            <option value="theme-forest">🌲 Forest Retreat</option>
            <option value="theme-coffee">☕ Coffee Shop</option>
        </select>
    </div>
    
    <div class="profile-manager">
        <select id="studentSelector" onchange="switchStudent()">
            <option value="">-- Add New Student --</option>
        </select>
        <button class="btn btn-warning" onclick="clearForm()" title="Create New">➕ New</button>
        <button class="btn btn-danger" id="deleteBtn" onclick="deleteProfile()" style="display:none;" title="Delete Profile">🗑️ Delete</button>
    </div>
    
    <div class="category">
        <h3>1. Personal Details</h3>
        <div class="grid-2">
            <div class="form-group"><label>Name (Used to save profile)</label><div class="input-wrapper"><input type="text" class="form-data" id="name" placeholder="Full Name"></div></div>
            <div class="form-group"><label>DOB</label><div class="input-wrapper"><input type="date" class="form-data" id="dob"></div></div>
            <div class="form-group"><label>Father's Name</label><div class="input-wrapper"><input type="text" class="form-data" id="fatherName"></div></div>
            <div class="form-group"><label>Mother's Name</label><div class="input-wrapper"><input type="text" class="form-data" id="motherName"></div></div>
            <div class="form-group"><label>Gender</label><div class="input-wrapper"><input type="text" class="form-data" id="gender" placeholder="Male/Female/Other"></div></div>
            <div class="form-group"><label>Category</label><div class="input-wrapper"><input type="text" class="form-data" id="category" placeholder="UR/OBC/SC/ST/EWS"></div></div>
            <div class="form-group"><label>Blood Group</label><div class="input-wrapper"><input type="text" class="form-data" id="bloodGroup" placeholder="e.g., O+"></div></div>
            <div class="form-group"><label>Nationality</label><div class="input-wrapper"><input type="text" class="form-data" id="nationality" placeholder="Indian"></div></div>
            <div class="form-group"><label>Religion</label><div class="input-wrapper"><input type="text" class="form-data" id="religion"></div></div>
        </div>
    </div>

    <div class="category">
        <h3>2. Address Details</h3>
        <div class="form-group"><label>Full Address</label><div class="input-wrapper"><input type="text" class="form-data" id="fullAddress" placeholder="Complete address for easy copy"></div></div>
        <div class="grid-2">
            <div class="form-group"><label>Vill/Town</label><div class="input-wrapper"><input type="text" class="form-data" id="villTown"></div></div>
            <div class="form-group"><label>P.O. (Post Office)</label><div class="input-wrapper"><input type="text" class="form-data" id="postOffice"></div></div>
            <div class="form-group"><label>P.S. (Police Station)</label><div class="input-wrapper"><input type="text" class="form-data" id="policeStation"></div></div>
            <div class="form-group"><label>District</label><div class="input-wrapper"><input type="text" class="form-data" id="district"></div></div>
            <div class="form-group"><label>PIN Code</label><div class="input-wrapper"><input type="text" class="form-data" id="pinCode"></div></div>
            <div class="form-group"><label>State</label><div class="input-wrapper"><input type="text" class="form-data" id="state"></div></div>
        </div>
    </div>

    <div class="category">
        <h3>3. Contact, IDs & Bank</h3>
        <div class="grid-2">
            <div class="form-group"><label>Mobile 1</label><div class="input-wrapper"><input type="tel" class="form-data" id="mob1"></div></div>
            <div class="form-group"><label>Mobile 2</label><div class="input-wrapper"><input type="tel" class="form-data" id="mob2"></div></div>
            <div class="form-group"><label>Email 1</label><div class="input-wrapper"><input type="email" class="form-data" id="email1"></div></div>
            <div class="form-group"><label>Email 2</label><div class="input-wrapper"><input type="email" class="form-data" id="email2"></div></div>
            <div class="form-group"><label>Aadhaar Number</label><div class="input-wrapper"><input type="text" class="form-data" id="aadhaarNo"></div></div>
            <div class="form-group"><label>PAN Number</label><div class="input-wrapper"><input type="text" class="form-data" id="panNo"></div></div>
            <div class="form-group"><label>Voter/Passport/DL</label><div class="input-wrapper"><input type="text" class="form-data" id="altId"></div></div>
            <div class="form-group"><label>Bank Name & Branch</label><div class="input-wrapper"><input type="text" class="form-data" id="bankName"></div></div>
            <div class="form-group"><label>Bank A/C 1</label><div class="input-wrapper"><input type="text" class="form-data" id="bankAc1"></div></div>
            <div class="form-group"><label>Bank IFSC</label><div class="input-wrapper"><input type="text" class="form-data" id="bankIfsc"></div></div>
        </div>
    </div>

    <div class="category">
        <h3>4. Academic Details</h3>
        <h4>Class 10</h4>
        <div class="grid-2">
            <div class="form-group"><label>Board/Council</label><div class="input-wrapper"><input type="text" class="form-data" id="board10"></div></div>
            <div class="form-group"><label>School Name</label><div class="input-wrapper"><input type="text" class="form-data" id="school10"></div></div>
            <div class="form-group"><label>Reg No</label><div class="input-wrapper"><input type="text" class="form-data" id="reg10"></div></div>
            <div class="form-group"><label>Roll & No</label><div class="input-wrapper"><input type="text" class="form-data" id="roll10"></div></div>
            <div class="form-group"><label>Marks/Percentage</label><div class="input-wrapper"><input type="text" class="form-data" id="marks10"></div></div>
            <div class="form-group"><label>Year of Passing</label><div class="input-wrapper"><input type="text" class="form-data" id="passYear10"></div></div>
        </div>
        <h4>Class 12</h4>
        <div class="grid-2">
            <div class="form-group"><label>Board/Council</label><div class="input-wrapper"><input type="text" class="form-data" id="board12"></div></div>
            <div class="form-group"><label>School Name</label><div class="input-wrapper"><input type="text" class="form-data" id="school12"></div></div>
            <div class="form-group"><label>Reg No</label><div class="input-wrapper"><input type="text" class="form-data" id="reg12"></div></div>
            <div class="form-group"><label>Marks/Percentage</label><div class="input-wrapper"><input type="text" class="form-data" id="marks12"></div></div>
            <div class="form-group"><label>Sem 3 Roll & No</label><div class="input-wrapper"><input type="text" class="form-data" id="rollSem3"></div></div>
            <div class="form-group"><label>Sem 4 Roll & No</label><div class="input-wrapper"><input type="text" class="form-data" id="rollSem4"></div></div>
            <div class="form-group"><label>Year of Passing</label><div class="input-wrapper"><input type="text" class="form-data" id="passYear12"></div></div>
        </div>
    </div>

    <div class="category">
        <h3>5. Important Links</h3>
        <div class="form-group"><label>Drive Wallet Link</label><div class="input-wrapper"><input type="url" class="form-data" id="driveLink"></div></div>
        <div class="form-group"><label>Passport Photo Link</label><div class="input-wrapper"><input type="url" class="form-data" id="photoLink"></div></div>
        <div class="form-group"><label>Signature Link</label><div class="input-wrapper"><input type="url" class="form-data" id="sigLink"></div></div>
        <div class="form-group"><label>Thumb Impression Link</label><div class="input-wrapper"><input type="url" class="form-data" id="thumbLink"></div></div>
        <div class="form-group"><label>DigiLocker Link</label><div class="input-wrapper"><input type="url" class="form-data" id="digilockerLink"></div></div>
    </div>

    <div class="button-group sticky-bottom">
        <button id="editBtn" class="btn btn-secondary" onclick="enableEdit()" style="display:none;">✏️ Edit Data</button>
        <button id="saveBtn" class="btn btn-primary" onclick="saveData()">💾 Save & Sync</button>
    </div>
    <div class="button-group">
        <button class="btn btn-share" onclick="shareBlank()">📤 Share Empty Form</button>
        <button class="btn btn-danger" onclick="shareWithInfo()">🚨 Share MY Data</button>
    </div>
</div>

<script src="script.js"></script>
<script src="theme.js"></script>
</body>
</html>
